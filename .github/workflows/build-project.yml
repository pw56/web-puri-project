name: Build Project

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: "dev"

jobs:
  build-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          targets: wasm32-unknown-unknown

      - name: Cache wasm-pack & pkg
        id: cache-wasm-pack
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            **/pkg/
          key: ${{ runner.os }}-wasm-pack-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-wasm-pack-

      # キャッシュがない（またはCargo.lockが更新された）場合のみインストール
      - name: Install wasm-pack
        if: steps.cache-wasm-packcache-wasm-pack.outputs.cache-hit != 'true'
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi

      - name: Build project
        working-directory: ./apps
        run: |
          if [ "${{ inputs.mode }}" = "release" ]; then
            npm run build-project:release
          else
            npm run build-project:dev
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: project-dist-${{ inputs.mode }}
          path: ./dist/
