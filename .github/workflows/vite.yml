name: Vite Build (PWA)

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: "dev"

jobs:
  build-vite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vite bundle
        working-directory: ./apps/app
        run: |
          if [ "${{ inputs.mode }}" = "release" ]; then
            npm run build:release
          else
            npm run build:dev
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pwa-dist-${{ inputs.mode }}
          path: ./apps/app/dist/
